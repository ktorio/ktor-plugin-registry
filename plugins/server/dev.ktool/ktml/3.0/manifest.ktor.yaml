name: KTML
description: Serves dynamic HTML using a custom templating format
vcsLink: https://github.com/ktool-dev/ktml
license: MIT
category: Templating
prerequisites:
  - routing
gradle:
  plugins:
    - id: dev.ktml.gradle
      version: $ktml
installation:
  default: install.kt
  in_routing: routing.kt
resources:
  - templates/index.ktml