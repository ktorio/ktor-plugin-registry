version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-gradle:
        patterns:
          - "*"
    ignore:
      # Gradle 9.5.x has a StackOverflowError regression in
      # CompositeDomainObjectSet (gradle/gradle#37498).
      # Re-enable once a fixed 9.5.x patch (or 9.6) ships.
      - dependency-name: "gradle"
        versions: [ ">=9.4, <9.6" ]
      - dependency-name: "gradle-wrapper"
        versions: [ ">=9.4, <9.6" ]
      # Incompatible with our current Gradle enterprise
      - dependency-name: "com.gradle.develocity"
        versions: [ ">=4.4, <4.5" ]
