kastle-core = { module = "org.jetbrains:kastle-core", version.ref="kastle" }
kastle-local = { module = "org.jetbrains:kastle-local", version.ref="kastle" }

[plugins]
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
kotlinx-rpc = { id = "org.jetbrains.kotlinx.rpc.plugin", version.ref = "kotlinx-rpc" }
kotlinx-rpc-grpc = { id = "org.jetbrains.kotlinx.rpc.plugin", version.ref = "kotlinx-rpc-grpc" }
testBalloon = { id = "de.infix.testBalloon", version.ref = "testballoon" }
