[versions]
kotlin = "2.3.21"
logback = "1.5.34"
prometheus = "1.16.5"
kotlinx-browser = "0.5.0"
kotlinx-html = "0.12.0"
koog = "0.8.0"
develocity = "4.3.2" # Should be compatible with our server: ge.jetbrains.com
develocity-commonCustomUserData = "2.6.0"
exposed = "1.3.0"
h2 = "2.4.240"
mongodb = "5.8.0"
koin = "4.2.1"
kotlinx-rpc = "0.10.2"
kotlinx-rpc-grpc = "0.11.0-grpc-187"
kotlinx-io = "0.9.0"
opentelemetry = "1.62.0"
opentelemetry-semconv = "1.41.1"
opentelemetry-ktor = "2.28.1-alpha"
testballoon = "1.0.0-K2.3.20"
kastle = "0.2.1"

[libraries]
develocity = { module = "com.gradle:develocity-gradle-plugin", version.ref = "develocity" }
develocity-commonCustomUserData = { module = "com.gradle:common-custom-user-data-gradle-plugin", version.ref = "develocity-commonCustomUserData" }
