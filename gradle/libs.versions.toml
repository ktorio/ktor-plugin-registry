[versions]
ktor = "3.4.0"
kotlin = "2.3.0"
logback = "1.5.21"
prometheus = "1.6.+"

[libraries]
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
micrometer-micrometerRegistryPrometheus = { module = "io.micrometer:micrometer-registry-prometheus", version.ref = "prometheus" }
webjars-jquery = { module = "org.webjars:jquery", version = "3.2.1" }

[plugins]
ktor = { id = "io.ktor.plugin", version.ref = "ktor" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
