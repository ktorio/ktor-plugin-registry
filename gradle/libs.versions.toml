[versions]
ktor = "3.4.1"
kotlin = "2.3.20"
logback = "1.5.21"
prometheus = "1.16.4"
kotlinx-browser = "0.5.0"
kotlinx-html = "0.12.0"
koog = "0.5.1"
exposed = "1.2.0"
h2 = "2.4.240"
mongodb = "4.11.5"
koin = "4.2.0"
kotlinx-rpc = "0.10.2"
kotlinx-rpc-grpc = "0.11.0-grpc-185"
