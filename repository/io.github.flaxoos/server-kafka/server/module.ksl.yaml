platform: jvm
dependencies:
  - $libs.flaxoos.ktorServerKafka
  - $ktorLibs.client.core
sources:
  - target: slot://io.ktor/server-core/applicationConf
    text: |-
      ktor {
        kafka {
          schema.registry.url = ["SCHEMA_REGISTRY_URL"]
          common {
            "bootstrap.servers" = ["BOOTSTRAP_SERVERS"]
            # Additional attributes
          }
          admin {
            # Additional attributes
          }
          consumer {
            "group.id" = "my-group-id"
            # Additional attributes
          }
          producer {
            "client.id" = "my-client-id"
            # Additional attributes
          }
          topics = [
            {
              name = my-topic
              partitions = 1
              configs {
                "message.timestamp.type" = CreateTime
                # Additional attributes
              }
            }
          ]
        }
      }
  - target: slot://io.ktor/server-core/applicationYaml
    text: |-
      ktor:
        kafka:
          schema.registry.url:
            - "SCHEMA_REGISTRY_URL"
          common:
            bootstrap.servers:
              - "BOOTSTRAP_SERVERS"
            # Additional attributes
          admin:
          # Additional attributes
          consumer:
            group.id: "my-group-id"
            # Additional attributes
          producer:
            client.id: "my-client-id"
            # Additional attributes
          topics:
            - name: my-topic
              partitions: 1
              configs:
                message.timestamp.type: CreateTime
                # Additional attributes
      
