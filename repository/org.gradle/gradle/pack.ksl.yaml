name: Gradle
description: An extensible build system for JVM languages
tags:
  - core
properties:
  - key: isExecutable
    type: boolean
    default: false
    hidden: true
  - key: includeWrapper
    type: boolean
    default: true
rootSources:
  - path: gradlew
    if: includeWrapper
  - path: gradlew.bat
    if: includeWrapper
  - path: gradle/wrapper/gradle-wrapper.jar
    if: includeWrapper
  - path: gradle/wrapper/gradle-wrapper.properties
  - path: settings.gradle.kts
  - path: gradle.properties.hbs
    target: file:gradle.properties
  - path: root.build.gradle.kts
    target: file:build.gradle.kts
    if: _project.modules.size > 1
  - path: libs.versions.toml.hbs
    target: file:gradle/libs.versions.toml
commonSources:
  - path: build.gradle.kts
links:
  vcs: https://github.com/gradle/gradle
